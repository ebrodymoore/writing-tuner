<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>writing-tuner</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>writing-tuner</h1>
  <p class="subtitle">Click or drag to select words, then annotate</p>
  <div id="draft-container"></div>
  <p class="annotation-count"><span id="count">0</span> annotations</p>

  <div id="toolbar">
    <div class="selected-text" id="selected-text"></div>
    <div class="input-row">
      <label>Comment</label>
      <input id="comment-input" type="text" placeholder="Why do you feel this way?">
    </div>
    <div class="input-row">
      <label>Suggest</label>
      <input id="suggest-input" type="text" placeholder="Replacement text">
    </div>
    <div class="actions">
      <button class="like-btn" id="like-btn">&#x1f44d; Like</button>
      <button class="dislike-btn" id="dislike-btn">&#x1f44e; Dislike</button>
      <button class="comment-btn" id="comment-btn">&#x1f4ac; Comment</button>
    </div>
  </div>

  <script>
    let draft = null;
    let selectedWords = []; // [{wordIdx, el}]
    let annotationCount = 0;
    let isSelecting = false;
    let editingKey = null; // non-null when re-opening an existing annotation

    // Client-side annotation store: key -> annotation object
    const annotationMap = new Map();

    document.getElementById('like-btn').addEventListener('click', () => submitAnnotation('like'));
    document.getElementById('dislike-btn').addEventListener('click', () => submitAnnotation('dislike'));
    document.getElementById('comment-btn').addEventListener('click', () => submitAnnotation('comment'));
    async function init() {
      const container = document.getElementById('draft-container');
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;padding:3rem;';
      msg.textContent = 'Waiting for draft text...';
      container.appendChild(msg);

      // Poll for draft — it may not exist yet if server started before text was prepared
      for (let attempt = 0; attempt < 60; attempt++) {
        try {
          const res = await fetch('/api/draft');
          if (res.ok) {
            const data = await res.json();
            if (data.words && data.words.length > 0) {
              draft = data;
              render();
              return;
            }
          }
        } catch {}
        await new Promise(r => setTimeout(r, 1000));
      }
      msg.textContent = 'No draft loaded. Return to terminal.';
    }

    function render() {
      const container = document.getElementById('draft-container');
      container.textContent = '';

      // Detect paragraph breaks from raw text
      // Split raw on double newlines, count words per paragraph to know when to start a new <p>
      const paragraphs = draft.raw.split(/\n\s*\n/);
      const paragraphWordCounts = paragraphs.map(p =>
        p.split(/\s+/).filter(w => w.length > 0).length
      );

      let currentP = document.createElement('p');
      container.appendChild(currentP);
      let wordsInCurrentParagraph = 0;
      let paragraphIdx = 0;

      for (let i = 0; i < draft.words.length; i++) {
        // Check if we need to start a new paragraph
        if (paragraphIdx < paragraphWordCounts.length &&
            wordsInCurrentParagraph >= paragraphWordCounts[paragraphIdx]) {
          paragraphIdx++;
          wordsInCurrentParagraph = 0;
          currentP = document.createElement('p');
          container.appendChild(currentP);
        }

        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = draft.words[i];
        span.dataset.word = String(i);
        span.addEventListener('mousedown', onWordMouseDown);
        currentP.appendChild(span);

        wordsInCurrentParagraph++;

        // Space between words
        if (i < draft.words.length - 1 &&
            !(paragraphIdx < paragraphWordCounts.length &&
              wordsInCurrentParagraph >= paragraphWordCounts[paragraphIdx])) {
          const space = document.createElement('span');
          space.className = 'word-space';
          space.textContent = ' ';
          space.dataset.afterWord = String(i);
          currentP.appendChild(space);
        }
      }

      document.addEventListener('mouseup', onMouseUp);
    }

    function onWordMouseDown(e) {
      const el = e.target;
      if (!el.classList.contains('word')) return;
      e.preventDefault();

      // If clicking an annotated word, re-open its annotation
      if (el.classList.contains('has-annotation')) {
        const key = el.dataset.annotationKey;
        if (key && annotationMap.has(key)) {
          reopenAnnotation(key, el);
          return;
        }
      }

      clearSelection();
      isSelecting = true;
      addToSelection(el);
    }

    // Container-level mousemove for reliable drag selection
    document.addEventListener('mousemove', (e) => {
      if (!isSelecting) return;
      let el = e.target;
      // If hovering a space between words, find the nearest word in drag direction
      if (el.classList.contains('word-space')) {
        const next = el.nextElementSibling;
        if (next && next.classList.contains('word')) el = next;
        else return;
      }
      if (!el.classList.contains('word')) return;

      // Allow cross-paragraph selection — get all word spans in document order
      // and select everything between the first selected word and the current one
      if (selectedWords.length > 0) {
        const allWords = [...document.querySelectorAll('#draft-container .word')];
        const firstEl = selectedWords[0].el;
        const firstPos = allWords.indexOf(firstEl);
        const curPos = allWords.indexOf(el);
        if (firstPos === -1 || curPos === -1) return;

        const lo = Math.min(firstPos, curPos);
        const hi = Math.max(firstPos, curPos);

        // Select all words between first and current (inclusive)
        for (let i = lo; i <= hi; i++) {
          addToSelection(allWords[i]);
        }
      } else {
        addToSelection(el);
      }
    });

    function onMouseUp() {
      if (!isSelecting) return;
      isSelecting = false;
      if (selectedWords.length > 0) showToolbar();
    }

    function addToSelection(el) {
      const wordIdx = parseInt(el.dataset.word, 10);
      const already = selectedWords.find(
        (w) => w.wordIdx === wordIdx
      );
      if (!already) {
        selectedWords.push({ wordIdx, el });
        el.classList.add('selected');

        // Also highlight the space span connecting to previous selected word
        if (selectedWords.length > 1) {
          const prev = selectedWords[selectedWords.length - 2];
          const minIdx = Math.min(prev.wordIdx, wordIdx);
          const maxIdx = Math.max(prev.wordIdx, wordIdx);
          // Highlight all spaces between min and max
          for (let si = minIdx; si < maxIdx; si++) {
            const space = document.querySelector(
              `.word-space[data-after-word="${si}"]`
            );
            if (space) space.classList.add('selected');
          }
        }
      }
    }

    function clearSelection() {
      for (const w of selectedWords) w.el.classList.remove('selected');
      // Also clear any selected space spans
      document.querySelectorAll('.word-space.selected').forEach(s => s.classList.remove('selected'));
      selectedWords = [];
      editingKey = null;
      hideToolbar();
    }

    function showToolbar(prefill) {
      const toolbar = document.getElementById('toolbar');
      const commentInput = document.getElementById('comment-input');
      const suggestInput = document.getElementById('suggest-input');
      const selectedTextEl = document.getElementById('selected-text');

      // Show selected text
      const text = selectedWords.map(w =>
        draft.words[w.wordIdx]
      ).join(' ');
      selectedTextEl.textContent = '"' + text + '"';

      // Pre-fill if editing existing annotation
      if (prefill) {
        commentInput.value = prefill.comment || '';
        suggestInput.value = prefill.replacement || '';
        // Highlight the active action button
        document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
        if (prefill.action === 'like') document.getElementById('like-btn').classList.add('active');
        if (prefill.action === 'dislike') document.getElementById('dislike-btn').classList.add('active');
        if (prefill.action === 'comment') document.getElementById('comment-btn').classList.add('active');
      } else {
        commentInput.value = '';
        suggestInput.value = '';
        document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
      }

      // Position toolbar near selection — flip above if near viewport bottom
      const last = selectedWords[selectedWords.length - 1].el;
      const rect = last.getBoundingClientRect();
      const toolbarHeight = 180; // approximate height of toolbar
      const spaceBelow = window.innerHeight - rect.bottom;

      if (spaceBelow < toolbarHeight + 16) {
        // Not enough room below — position above the first selected word
        const first = selectedWords[0].el;
        const firstRect = first.getBoundingClientRect();
        toolbar.style.top = (firstRect.top - toolbarHeight - 8) + 'px';
      } else {
        toolbar.style.top = (rect.bottom + 8) + 'px';
      }
      toolbar.style.left = Math.min(rect.left, window.innerWidth - 340) + 'px';
      toolbar.classList.add('visible');

      commentInput.focus();
    }

    function hideToolbar() {
      const toolbar = document.getElementById('toolbar');
      toolbar.classList.remove('visible');
      document.getElementById('comment-input').value = '';
      document.getElementById('suggest-input').value = '';
      document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
    }

    function reopenAnnotation(key, clickedEl) {
      const ann = annotationMap.get(key);
      if (!ann) return;

      clearSelection();

      // Re-select the annotated words
      const container = document.getElementById('draft-container');
      for (let i = ann.start; i <= ann.end; i++) {
        const span = container.querySelector(`span.word[data-word="${i}"]`);
        if (span) {
          selectedWords.push({ wordIdx: i, el: span });
          span.classList.add('selected');
        }
      }

      editingKey = key;
      showToolbar(ann);
    }

    async function submitAnnotation(action) {
      if (selectedWords.length === 0) return;

      const comment = document.getElementById('comment-input').value.trim();
      const replacement = document.getElementById('suggest-input').value.trim();

      // Get sorted word indices for the flat annotation
      const sorted = [...selectedWords].sort((a, b) => a.wordIdx - b.wordIdx);
      const start = sorted[0].wordIdx;
      const end = sorted[sorted.length - 1].wordIdx;
      const text = sorted.map(w => draft.words[w.wordIdx]).join(' ');

      const annotation = {
        start,
        end,
        text,
        action,
      };
      if (comment) annotation.comment = comment;
      if (replacement) annotation.replacement = replacement;

      await fetch('/api/annotate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(annotation),
      });

      const key = start + '-' + end;
      annotationMap.set(key, annotation);

      // Apply visual feedback
      const cssClass =
        action === 'like' ? 'liked' :
        action === 'dislike' ? 'disliked' :
        action === 'comment' ? 'commented' : 'suggested';

      // Build tooltip text
      const tooltipParts = [];
      const actionEmoji = action === 'like' ? '\u{1f44d}' : action === 'dislike' ? '\u{1f44e}' : '\u{1f4ac}';
      tooltipParts.push(actionEmoji + ' ' + (action === 'comment' ? 'Comment' : action.charAt(0).toUpperCase() + action.slice(1)));
      if (comment) tooltipParts.push('"' + comment + '"');
      if (replacement) tooltipParts.push('\u270f\ufe0f \u2192 "' + replacement + '"');
      const tooltipText = tooltipParts.join('\n');

      const isGroup = sorted.length > 1;

      for (let wi = 0; wi < sorted.length; wi++) {
        const w = sorted[wi];
        w.el.classList.remove('selected', 'liked', 'disliked', 'suggested', 'commented',
          'group-start', 'group-middle', 'group-end', 'group-solo');
        w.el.classList.add(cssClass, 'has-annotation');
        w.el.dataset.annotationKey = key;

        // Group shape classes for continuous pill highlight
        if (isGroup) {
          if (wi === 0) w.el.classList.add('group-start');
          else if (wi === sorted.length - 1) w.el.classList.add('group-end');
          else w.el.classList.add('group-middle');
        } else {
          w.el.classList.add('group-solo');
        }

        // Tooltip
        const existing = w.el.getAttribute('data-tooltip');
        if (existing && editingKey !== key) {
          w.el.setAttribute('data-tooltip', existing + '\n---\n' + tooltipText);
        } else {
          w.el.setAttribute('data-tooltip', tooltipText);
        }

        // Highlight the space span AFTER this word (if next word is also in the group)
        if (wi < sorted.length - 1) {
          const spaceSpan = document.querySelector(
            `.word-space[data-after-word="${w.wordIdx}"]`
          );
          if (spaceSpan) {
            spaceSpan.classList.remove('liked', 'disliked', 'suggested', 'commented');
            spaceSpan.classList.add(cssClass, 'group-space');
          }
        }
      }

      if (!editingKey) {
        annotationCount++;
        document.getElementById('count').textContent = String(annotationCount);
      }

      clearSelection();
    }

    // Close toolbar on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        clearSelection();
      }
    });

    // Close toolbar when clicking outside — use mousedown so it fires
    // BEFORE the drag cycle, not after (click fires after mouseup and
    // would immediately dismiss the toolbar that onMouseUp just showed)
    document.addEventListener('mousedown', (e) => {
      if (isSelecting) return; // don't dismiss during active drag
      if (e.target.closest('#toolbar')) return; // don't dismiss when clicking toolbar
      if (e.target.classList.contains('word')) return; // word clicks handled by onWordMouseDown
      if (e.target.classList.contains('word-space')) return; // spaces between words
      clearSelection();
    });

    init();
  </script>
</body>
</html>
